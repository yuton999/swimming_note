name: iOS Build Check (unsigned)

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: macos-14
    steps:
      - name: リポジトリを取得
        uses: actions/checkout@v4

      - name: Node.jsをセットアップ
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Node.jsのバージョンを確認
        run: node --version

      - name: 依存パッケージをインストール
        run: npm install

      - name: iOSプロジェクトを生成
        run: npx cap add ios

      - name: Webアセットを同期
        run: npx cap sync ios

      - name: Xcodeプロジェクトの中身を確認(ビルドはまだしない)
        run: |
          ls -la ios/App
          xcodebuild -list -project ios/App/App.xcodeproj
