name: iOS Build Check (unsigned)

# 手動で実行(Actionsタブの「Run workflow」ボタン)するか、
# mainブランチにpushされたときに自動実行されます。
on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: macos-14
    steps:
      - name: リポジトリを取得
        uses: actions/checkout@v4

      - name: Node.jsをセットアップ
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: 依存パッケージをインストール
        run: npm install

      - name: iOSプロジェクトを生成
        run: npx cap add ios

      - name: Webアセットを同期
        run: npx cap sync ios

      - name: ビルド(署名なし・シミュレータ向け)
        run: |
          cd ios/App
          xcodebuild -workspace App.xcworkspace \
            -scheme App \
            -sdk iphonesimulator \
            -configuration Debug \
            CODE_SIGNING_ALLOWED=NO \
            build
