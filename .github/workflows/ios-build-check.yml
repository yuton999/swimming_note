name: iOS Build & Upload to TestFlight

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    steps:
      - name: リポジトリを取得
        uses: actions/checkout@v4

      - name: Node.jsをセットアップ
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: 依存パッケージをインストール
        run: npm install

      - name: iOSプロジェクトを生成
        run: npx cap add ios

      - name: Webアセットを同期
        run: npx cap sync ios

      - name: 【デバッグ】証明書データの中身を確認
        env:
          APPSTORE_P12_BASE64: ${{ secrets.APPSTORE_P12_BASE64 }}
          APPSTORE_P12_PASSWORD: ${{ secrets.APPSTORE_P12_PASSWORD }}
        run: |
          echo "base64文字数(改行含む): ${#APPSTORE_P12_BASE64}"
          echo "パスワード文字数: ${#APPSTORE_P12_PASSWORD}"
          echo "$APPSTORE_P12_BASE64" | base64 --decode > $RUNNER_TEMP/debug.p12
          echo "デコード後のファイルサイズ:"
          ls -la $RUNNER_TEMP/debug.p12
          echo "デコード後のsha256:"
          shasum -a 256 $RUNNER_TEMP/debug.p12
          echo "期待するsha256(新しいlegacy形式): 75c11efbdad0052f16bc74851f91fa08533c5e7d201dc2b5221715bd8201f3bf"
          echo "---実際の暗号化方式(ここが一番大事)---"
          openssl pkcs12 -in $RUNNER_TEMP/debug.p12 -passin pass:"$APPSTORE_P12_PASSWORD" -info -noout 2>&1 || true

      - name: 証明書をキーチェーンに読み込む
        env:
          APPSTORE_P12_BASE64: ${{ secrets.APPSTORE_P12_BASE64 }}
          APPSTORE_P12_PASSWORD: ${{ secrets.APPSTORE_P12_PASSWORD }}
          KEYCHAIN_PASSWORD: temporary-keychain-pass
        run: |
          echo "$APPSTORE_P12_BASE64" | base64 --decode > $RUNNER_TEMP/distribution.p12

          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security set-keychain-settings -lut 21600 build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain

          security import $RUNNER_TEMP/distribution.p12 -k build.keychain -P "$APPSTORE_P12_PASSWORD" -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" build.keychain

          security list-keychains -d user -s build.keychain $(security list-keychains -d user | sed 's/"//g')

      - name: Provisioning Profileを設置
        env:
          APPSTORE_PROVISION_PROFILE_BASE64: ${{ secrets.APPSTORE_PROVISION_PROFILE_BASE64 }}
        run: |
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          echo "$APPSTORE_PROVISION_PROFILE_BASE64" | base64 --decode > ~/Library/MobileDevice/Provisioning\ Profiles/swimmingnote.mobileprovision

      - name: アーカイブを作成(署名込み)
        run: |
          cd ios/App
          xcodebuild -project App.xcodeproj \
            -scheme App \
            -destination 'generic/platform=iOS' \
            -configuration Release \
            -archivePath $RUNNER_TEMP/App.xcarchive \
            DEVELOPMENT_TEAM=4YX785HWJD \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="Apple Distribution" \
            PROVISIONING_PROFILE_SPECIFIER="swimming_note" \
            archive

      - name: exportOptions.plistを作成
        run: |
          cat > $RUNNER_TEMP/exportOptions.plist << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store-connect</string>
            <key>teamID</key>
            <string>4YX785HWJD</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>com.yuton999.swimmingnote</key>
              <string>swimming_note</string>
            </dict>
          </dict>
          </plist>
          EOF

      - name: IPAを書き出し
        run: |
          xcodebuild -exportArchive \
            -archivePath $RUNNER_TEMP/App.xcarchive \
            -exportPath $RUNNER_TEMP/export \
            -exportOptionsPlist $RUNNER_TEMP/exportOptions.plist

      - name: TestFlightへアップロード
        env:
          APPSTORE_KEY_ID: ${{ secrets.APPSTORE_KEY_ID }}
          APPSTORE_ISSUER_ID: ${{ secrets.APPSTORE_ISSUER_ID }}
          APPSTORE_PRIVATE_KEY: ${{ secrets.APPSTORE_PRIVATE_KEY }}
        run: |
          mkdir -p ~/private_keys
          echo "$APPSTORE_PRIVATE_KEY" > ~/private_keys/AuthKey_${APPSTORE_KEY_ID}.p8
          xcrun altool --upload-app \
            -f $RUNNER_TEMP/export/*.ipa \
            -t ios \
            --apiKey ${APPSTORE_KEY_ID} \
            --apiIssuer ${APPSTORE_ISSUER_ID}
