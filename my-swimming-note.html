<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no">
<title>my swimming note</title>
<style>
:root{
  --navy:#1D3557;
  --blue:#2F6FED;
  --blue-soft:#EAF1FE;
  --border:#E3E6EA;
  --header-bg:#F5F6F8;
  --text:#1F2937;
  --muted:#8A94A3;
  --danger:#E0574C;
}
*{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
html,body{margin:0;padding:0;}
body{
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Hiragino Sans","Noto Sans JP",sans-serif;
  background:#FFFFFF;
  color:var(--text);
}

.screen{display:none;}
.screen.active{display:flex;flex-direction:column;min-height:100vh;}

/* ---- Top bar ---- */
.topbar{
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:14px 14px;
  border-bottom:1px solid var(--border);
  position:sticky;
  top:0;
  background:#fff;
  z-index:20;
}
.icon-btn{
  background:none;
  border:none;
  padding:6px;
  color:var(--navy);
  cursor:pointer;
  display:flex;
  align-items:center;
  justify-content:center;
  width:34px;
  height:34px;
  flex-shrink:0;
}
.icon-btn svg{width:22px;height:22px;}
.topbar-spacer{width:34px;flex-shrink:0;}
.title{
  font-size:19px;
  font-weight:700;
  color:var(--navy);
  letter-spacing:.01em;
  margin:0;
  text-align:center;
  flex:1;
}
.save-btn{
  background:none;
  border:none;
  color:var(--blue);
  font-size:15px;
  font-weight:600;
  cursor:pointer;
  padding:6px 4px;
  flex-shrink:0;
}
.save-btn:active{opacity:.6;}

/* ---- Calendar ---- */
.cal-header{
  display:flex;
  align-items:center;
  justify-content:center;
  gap:18px;
  padding:16px 0 6px;
}
.month-label{
  font-size:16px;
  font-weight:700;
  color:var(--navy);
  min-width:110px;
  text-align:center;
}
.cal-arrow{
  background:none;
  border:none;
  color:var(--blue);
  font-size:20px;
  font-weight:700;
  cursor:pointer;
  padding:4px 10px;
}
.cal-weekdays{
  display:grid;
  grid-template-columns:repeat(7,1fr);
  padding:8px 10px 4px;
}
.cal-weekdays span{
  text-align:center;
  font-size:11.5px;
  color:var(--muted);
  font-weight:600;
}
.cal-grid{
  display:grid;
  grid-template-columns:repeat(7,1fr);
  gap:4px;
  padding:0 10px 20px;
}
.cal-cell{
  aspect-ratio:1/1;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  border-radius:10px;
  background:none;
  border:none;
  font-size:14.5px;
  color:var(--text);
  cursor:pointer;
  position:relative;
  font-family:inherit;
}
.cal-cell.empty-cell{visibility:hidden;cursor:default;}
.cal-cell.today{font-weight:700;color:var(--blue);}
.cal-cell.today::before{
  content:"";
  position:absolute;
  inset:2px;
  border:1.5px solid var(--blue);
  border-radius:10px;
}
.cal-cell .dot{
  width:5px;
  height:5px;
  border-radius:50%;
  background:var(--blue);
  margin-top:3px;
}
.cal-cell:active{background:var(--header-bg);}

/* ---- Day screen ---- */
.day-content{
  flex:1;
  padding:24px 20px;
  display:flex;
  flex-direction:column;
  align-items:center;
}
.day-status{
  color:var(--muted);
  font-size:14.5px;
  margin:60px 0 22px;
}
.day-edit-btn{
  background:var(--blue);
  color:#fff;
  border:none;
  font-size:14.5px;
  font-weight:700;
  padding:11px 30px;
  border-radius:22px;
  cursor:pointer;
}
.day-edit-btn:active{opacity:.85;}
.day-summary{
  width:100%;
  max-width:420px;
}
.day-summary-total{
  display:flex;
  align-items:baseline;
  justify-content:center;
  gap:6px;
  margin:6px 0 18px;
}
.day-summary-total .n{font-size:28px;font-weight:800;color:var(--navy);}
.day-summary-total .u{font-size:13px;color:var(--muted);}
.day-row{
  border-bottom:1px solid var(--border);
  padding:9px 2px;
  font-size:13.5px;
  color:var(--text);
}
.day-row .main{font-weight:600;}
.day-row .sub{color:var(--muted);font-size:12.5px;margin-top:2px;}
.day-edit-btn-wrap{
  width:100%;
  max-width:420px;
  padding-top:18px;
  text-align:center;
}

/* ---- Table (edit screen) ---- */
.table-scroll{
  flex:1;
  overflow-x:auto;
  overflow-y:auto;
  -webkit-overflow-scrolling:touch;
}
table{
  border-collapse:collapse;
  width:100%;
  min-width:796px;
}
thead th{
  position:sticky;
  top:0;
  background:var(--header-bg);
  color:var(--muted);
  font-size:11px;
  font-weight:600;
  text-align:left;
  padding:9px 6px;
  border-bottom:1px solid var(--border);
  white-space:nowrap;
  z-index:10;
}
th.col-num, td.col-num{
  width:26px;
  text-align:center;
  color:var(--muted);
  font-size:12px;
}
tbody td{
  padding:6px 6px;
  border-bottom:1px solid var(--border);
  vertical-align:middle;
}
tbody tr:hover{background:#FAFBFC;}

.cell-input-group{
  display:flex;
  align-items:center;
  gap:3px;
}
.cell-input-group .unit{
  font-size:11px;
  color:var(--muted);
  flex-shrink:0;
}

input[type=number], input[type=text]{
  font-family:inherit;
  font-size:16px;
  color:var(--text);
  border:1px solid var(--border);
  border-radius:7px;
  padding:6px 6px;
  width:100%;
  min-width:0;
  background:#fff;
}
input[type=number]{width:48px;}
input[type=number]::-webkit-outer-spin-button,
input[type=number]::-webkit-inner-spin-button{
  -webkit-appearance:none;
  margin:0;
}
input[type=number]{-moz-appearance:textfield;}

select{
  font-family:inherit;
  font-size:16px;
  font-weight:600;
  color:var(--blue);
  border:1px solid var(--border);
  border-radius:7px;
  padding:6px 20px 6px 8px;
  background:#fff url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="10" height="6" viewBox="0 0 10 6"><path d="M1 1l4 4 4-4" stroke="%232F6FED" stroke-width="1.6" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>') no-repeat right 6px center;
  -webkit-appearance:none;
  appearance:none;
  width:100%;
  min-width:64px;
  cursor:pointer;
}

.time-field{
  position:relative;
}
.time-field input{
  padding-right:20px;
  width:64px;
  color:var(--text);
  cursor:pointer;
  background:#fff;
}
.time-field::after{
  content:"";
  position:absolute;
  right:7px;
  top:50%;
  width:8px;
  height:8px;
  transform:translateY(-65%) rotate(45deg);
  border-right:1.6px solid var(--blue);
  border-bottom:1.6px solid var(--blue);
  pointer-events:none;
}

td.col-memo input{
  border:none;
  border-radius:0;
  padding:6px 2px;
  min-width:130px;
  color:var(--text);
}
td.col-memo input:focus{
  outline:none;
  border-bottom:1.5px solid var(--blue);
}
td.col-memo{min-width:150px;}

th.col-clear, td.col-clear{
  width:36px;
  text-align:center;
  padding:6px 2px;
}
.row-clear-btn{
  background:none;
  border:none;
  color:var(--muted);
  font-size:17px;
  line-height:1;
  width:26px;
  height:26px;
  border-radius:50%;
  cursor:pointer;
  padding:0;
}
.row-clear-btn:active{background:var(--header-bg);color:var(--danger);}

input:focus, select:focus{
  outline:none;
  border-color:var(--blue);
  box-shadow:0 0 0 2px var(--blue-soft);
}

/* ---- Footer ---- */
.footer-bar{
  position:sticky;
  bottom:0;
  background:#fff;
  border-top:1px solid var(--border);
  padding:14px 16px calc(14px + env(safe-area-inset-bottom));
  display:flex;
  align-items:center;
  justify-content:space-between;
  z-index:20;
}
.total{
  display:flex;
  align-items:baseline;
  gap:6px;
}
.total-label{
  font-size:12.5px;
  color:var(--muted);
  font-weight:600;
}
.total-value{
  font-size:26px;
  font-weight:800;
  color:var(--navy);
  font-variant-numeric:tabular-nums;
}
.total-unit{
  font-size:13px;
  color:var(--muted);
}
.reset-btn{
  background:#fff;
  border:1px solid var(--border);
  color:var(--text);
  font-size:13.5px;
  font-weight:600;
  padding:9px 18px;
  border-radius:20px;
  cursor:pointer;
}
.reset-btn:active{background:var(--header-bg);}

.toast{
  position:fixed;
  bottom:80px;left:50%;
  transform:translateX(-50%);
  background:var(--navy);
  color:#fff;
  padding:9px 18px;
  border-radius:20px;
  font-size:13px;
  opacity:0;
  pointer-events:none;
  transition:opacity .2s, transform .2s;
  z-index:50;
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(-4px);}

/* ---- Time picker (iOS-style wheel, centered) ---- */
.picker-overlay{
  position:fixed;
  inset:0;
  background:rgba(15,23,42,.4);
  z-index:100;
  display:none;
  align-items:center;
  justify-content:center;
  padding:20px;
}
.picker-overlay.show{display:flex;}
.picker-sheet{
  background:#fff;
  width:100%;
  max-width:300px;
  border-radius:16px;
  box-shadow:0 12px 40px rgba(15,23,42,.25);
  opacity:0;
  transform:scale(.94);
  transition:transform .2s ease, opacity .2s ease;
}
.picker-overlay.show .picker-sheet{opacity:1;transform:scale(1);}
.picker-header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:12px 16px;
  border-bottom:1px solid var(--border);
}
.picker-header button{
  background:none;
  border:none;
  font-size:16px;
  color:var(--blue);
  font-weight:600;
  cursor:pointer;
  padding:4px;
}
.picker-header .picker-title{
  font-size:13px;
  color:var(--muted);
  font-weight:600;
}
.picker-wheels{
  position:relative;
  display:flex;
  justify-content:center;
  align-items:center;
  height:216px;
  overflow:hidden;
  padding:0 8px;
}
.picker-col{
  width:88px;
  height:216px;
  overflow-y:scroll;
  scroll-snap-type:y mandatory;
  -webkit-overflow-scrolling:touch;
  scrollbar-width:none;
  padding:90px 0;
}
.picker-col::-webkit-scrollbar{display:none;}
.picker-col .item{
  height:36px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:21px;
  color:var(--text);
  scroll-snap-align:center;
  font-variant-numeric:tabular-nums;
}
.picker-sep{
  font-size:21px;
  color:var(--muted);
  padding:0 2px;
  width:14px;
  text-align:center;
}
.picker-highlight{
  position:absolute;
  top:50%;
  left:16px;
  right:16px;
  height:36px;
  transform:translateY(-50%);
  border-top:1px solid var(--border);
  border-bottom:1px solid var(--border);
  pointer-events:none;
}
</style>
</head>
<body>

<!-- ============ 画面1: カレンダー ============ -->
<div class="screen active" id="screen-calendar">
  <div class="topbar">

  <div class="topbar">
    <button class="icon-btn" id="editBackBtn" aria-label="戻る">
      <svg viewBox="0 0 24 24" fill="none"><path d="M15 5l-7 7 7 7" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </button>

  </div>

  <div class="table-scroll">

      <thead>
        <tr>
          <th class="col-num"></th>

</div>

<!-- Time picker sheet -->
<div class="picker-overlay" id="pickerOverlay">

    <div class="picker-header">
      <button id="pickerCancel">キャンセル</button>

<script>
/* ==================================================
   共通ユーティリティ
================================================== */
function showToast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 1600);
}
function switchScreen(name){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById('screen-'+name).classList.add('active');
  window.scrollTo(0,0);
}
function pad2(n){ return String(n).padStart(2,'0'); }
function dateKey(y,m,d){ return `${y}-${pad2(m+1)}-${pad2(d)}`; }
function todayKey(){
  const t = new Date();
  return dateKey(t.getFullYear(), t.getMonth(), t.getDate());
}

/* ==================================================
   保存機能(ブラウザ標準のlocalStorageを利用)
   ※Claude専用のwindow.storage APIではなく、
     Safari/Chromeなど通常のブラウザや、将来Capacitorで
     iPhoneアプリ化した際にもそのまま動く実装。
================================================== */
const NOTE_PREFIX = 'swimnote:';
window.storage = {
  async get(key){
    const raw = localStorage.getItem(NOTE_PREFIX + key);
    if(raw === null) throw new Error('not found');
    return { key, value: raw, shared: false };
  },
  async set(key, value){
    localStorage.setItem(NOTE_PREFIX + key, value);
    return { key, value, shared: false };
  },
  async delete(key){
    localStorage.removeItem(NOTE_PREFIX + key);
    return { key, deleted: true, shared: false };
  },
  async list(prefix){
    const keys = [];
    for(let i = 0; i < localStorage.length; i++){
      const k = localStorage.key(i);
      if(!k || !k.startsWith(NOTE_PREFIX)) continue;
      const bare = k.slice(NOTE_PREFIX.length);
      if(!prefix || bare.startsWith(prefix)) keys.push(bare);
    }
    return { keys, prefix, shared: false };
  }
};

/* ==================================================
   画面1: カレンダー
================================================== */
let calYear, calMonth; // calMonth: 0-11
{
  const t = new Date();
  calYear = t.getFullYear();
  calMonth = t.getMonth();
}
let filledDates = new Set();

async function loadFilledDates(){
  filledDates = new Set();
  try{
    const res = await window.storage.list('sheet:');
    if(res && res.keys){
      res.keys.forEach(k=>{
        const d = k.replace('sheet:', '');
        filledDates.add(d);
      });
    }
  }catch(e){ /* no data yet */ }
}

function renderCalendar(){
  document.getElementById('monthLabel').textContent = `${calYear}年${calMonth+1}月`;
  const grid = document.getElementById('calGrid');
  grid.innerHTML = '';
  const firstDay = new Date(calYear, calMonth, 1).getDay();
  const daysInMonth = new Date(calYear, calMonth+1, 0).getDate();
  const tKey = todayKey();

  for(let i=0; i<firstDay; i++){
    const empty = document.createElement('div');
    empty.className = 'cal-cell empty-cell';
    grid.appendChild(empty);
  }
  for(let d=1; d<=daysInMonth; d++){
    const key = dateKey(calYear, calMonth, d);
    const cell = document.createElement('button');
    cell.className = 'cal-cell' + (key === tKey ? ' today' : '');
    cell.innerHTML = `<span>${d}</span>` + (filledDates.has(key) ? '<span class="dot"></span>' : '');
    cell.addEventListener('click', ()=> openDay(key));
    grid.appendChild(cell);
  }
}

document.getElementById('prevMonthBtn').addEventListener('click', ()=>{
  calMonth--;
  if(calMonth < 0){ calMonth = 11; calYear--; }
  renderCalendar();
});
document.getElementById('nextMonthBtn').addEventListener('click', ()=>{
  calMonth++;
  if(calMonth > 11){ calMonth = 0; calYear++; }
  renderCalendar();
});

/* ==================================================
   画面2: 日詳細
================================================== */
let selectedDate = null;

function formatDateTitle(key){
  const [y,m,d] = key.split('-').map(Number);
  const wd = ['日','月','火','水','木','金','土'][new Date(y, m-1, d).getDay()];
  return `${m}月${d}日(${wd})`;
}

async function openDay(key){
  selectedDate = key;
  document.getElementById('dayTitle').textContent = formatDateTitle(key);
  switchScreen('day');
  await renderDayScreen();
}

async function renderDayScreen(){
  const content = document.getElementById('dayContent');
  content.innerHTML = '<div class="day-status">読み込み中...</div>';
  let rows = null;
  try{
    const res = await window.storage.get('sheet:'+selectedDate);
    if(res && res.value) rows = JSON.parse(res.value);
  }catch(e){ rows = null; }

  const hasContent = rows && rows.some(r => Object.values(r).some(v => v !== '' && v != null));

  if(!hasContent){
    content.innerHTML = `
      <div class="day-status">未入力</div>
      <button class="day-edit-btn" id="dayEditBtn">編集</button>`;
  } else {
    let total = 0;
    const rowsHtml = rows.filter(r => Object.values(r).some(v => v !== '' && v != null)).map(r=>{
      const distance = parseFloat(r.distance) || 0;
      const reps = parseFloat(r.reps) || 1;
      const sets = parseFloat(r.sets) || 1;
      if(distance > 0) total += distance*reps*sets;
      const mainParts = [];
      if(r.type) mainParts.push(r.type);
      if(r.distance) mainParts.push(r.distance+'m');
      if(r.reps) mainParts.push(r.reps+'t');
      if(r.sets) mainParts.push(r.sets+'s');
      if(r.stroke) mainParts.push(r.stroke);
      const subParts = [];
      if(r.cycle) subParts.push('サイクル '+r.cycle);
      if(r.rest) subParts.push('レスト '+r.rest);
      if(r.memo) subParts.push(r.memo);
      return `<div class="day-row">
        <div class="main">${mainParts.join(' ・ ') || '(未設定)'}</div>
        ${subParts.length ? `<div class="sub">${subParts.join(' ・ ')}</div>` : ''}
      </div>`;
    }).join('');

    content.innerHTML = `
      <div class="day-summary">
        <div class="day-summary-total"><span class="n">${total.toLocaleString('ja-JP')}</span><span class="u">m</span></div>
        ${rowsHtml}
      </div>
      <div class="day-edit-btn-wrap">
        <button class="day-edit-btn" id="dayEditBtn">編集</button>
      </div>`;
  }
  document.getElementById('dayEditBtn').addEventListener('click', openEdit);
}

document.getElementById('dayBackBtn').addEventListener('click', ()=>{
  switchScreen('calendar');
  renderCalendar();
});

/* ==================================================
   画面3: 編集(セット記録表)
================================================== */
const ROW_COUNT = 20;
const TYPE_OPTIONS = ['', 'swim', 'kick', 'pull', 'drill', 'tech'];
const STROKE_OPTIONS = ['', 'fly', 'ba', 'br', 'fr', 'IM', 'mix', 'cho'];

function distanceOptions(){
  const opts = ['', '25', '50', '75', '100'];
  for(let d = 150; d <= 1000; d += 50) opts.push(String(d));
  return opts;
}
const DISTANCE_OPTIONS = distanceOptions();

function makeSelect(options, cls){
  const opts = options.map(o => `<option value="${o}">${o}</option>`).join('');
  return `<select class="${cls}">${opts}</select>`;
}

function buildRows(){
  const tbody = document.getElementById('tbody');
  let html = '';
  for(let i = 1; i <= ROW_COUNT; i++){
    html += `
      <tr data-row="${i}">
        <td class="col-num">${i}</td>
        <td>${makeSelect(TYPE_OPTIONS, 'f-type')}</td>
        <td>
          <div class="cell-input-group">
            ${makeSelect(DISTANCE_OPTIONS, 'f-distance')}
            <span class="unit">m</span>
          </div>
        </td>
        <td>
          <div class="cell-input-group">
            <input type="number" class="f-reps" min="0" inputmode="numeric">
            <span class="unit">t</span>
          </div>
        </td>
        <td>
          <div class="cell-input-group">
            <input type="number" class="f-sets" min="0" inputmode="numeric">
            <span class="unit">s</span>
          </div>
        </td>
        <td>
          <div class="time-field">
            <input type="text" class="f-cycle" placeholder=":" readonly>
          </div>
        </td>
        <td>
          <div class="time-field">
            <input type="text" class="f-rest" placeholder=":" readonly>
          </div>
        </td>
        <td>${makeSelect(STROKE_OPTIONS, 'f-stroke')}</td>
        <td class="col-memo"><input type="text" class="f-memo" placeholder=""></td>
        <td class="col-clear"><button type="button" class="row-clear-btn" aria-label="この行をクリア">×</button></td>
      </tr>`;
  }
  tbody.innerHTML = html;
}

function collectRows(){
  const rows = [];
  document.querySelectorAll('#tbody tr').forEach(tr=>{
    rows.push({
      type: tr.querySelector('.f-type').value,
      distance: tr.querySelector('.f-distance').value,
      reps: tr.querySelector('.f-reps').value,
      sets: tr.querySelector('.f-sets').value,
      cycle: tr.querySelector('.f-cycle').value,
      rest: tr.querySelector('.f-rest').value,
      stroke: tr.querySelector('.f-stroke').value,
      memo: tr.querySelector('.f-memo').value
    });
  });
  return rows;
}

function applyRows(rows){
  const trs = document.querySelectorAll('#tbody tr');
  trs.forEach((tr, i)=>{
    const r = rows[i];
    if(!r) return;
    tr.querySelector('.f-type').value = r.type || '';
    tr.querySelector('.f-distance').value = r.distance || '';
    tr.querySelector('.f-reps').value = r.reps || '';
    tr.querySelector('.f-sets').value = r.sets || '';
    tr.querySelector('.f-cycle').value = r.cycle || '';
    tr.querySelector('.f-rest').value = r.rest || '';
    tr.querySelector('.f-stroke').value = r.stroke || '';
    tr.querySelector('.f-memo').value = r.memo || '';
  });
  updateTotal();
}

function updateTotal(){
  let total = 0;
  document.querySelectorAll('#tbody tr').forEach(tr=>{
    const distance = parseFloat(tr.querySelector('.f-distance').value) || 0;
    if(distance <= 0) return;
    const reps = parseFloat(tr.querySelector('.f-reps').value) || 1;
    const sets = parseFloat(tr.querySelector('.f-sets').value) || 1;
    total += distance * reps * sets;
  });
  document.getElementById('totalValue').textContent = total.toLocaleString('ja-JP');
}

document.getElementById('tbody').addEventListener('input', updateTotal);
document.getElementById('tbody').addEventListener('change', updateTotal);

document.getElementById('tbody').addEventListener('click', (e)=>{
  const btn = e.target.closest('.row-clear-btn');
  if(!btn) return;
  const tr = btn.closest('tr');
  tr.querySelectorAll('input').forEach(inp => inp.value = '');
  tr.querySelectorAll('select').forEach(sel => sel.value = '');
  updateTotal();
});

async function openEdit(){
  document.getElementById('editTitle').textContent = formatDateTitle(selectedDate);
  buildRows();
  let rows = null;
  try{
    const res = await window.storage.get('sheet:'+selectedDate);
    if(res && res.value) rows = JSON.parse(res.value);
  }catch(e){ rows = null; }
  if(rows) applyRows(rows);
  else updateTotal();
  switchScreen('edit');
}

document.getElementById('editBackBtn').addEventListener('click', ()=>{
  switchScreen('day');
  renderDayScreen();
});

document.getElementById('saveBtn').addEventListener('click', async ()=>{
  const rows = collectRows();
  if(!window.storage){
    showToast('storage機能が利用できません');
    return;
  }
  const payload = JSON.stringify(rows);
  let lastError = null;
  for(let attempt = 0; attempt < 2; attempt++){
    try{
      await window.storage.set('sheet:'+selectedDate, payload);
      const hasContent = rows.some(r => Object.values(r).some(v => v !== '' && v != null));
      if(hasContent) filledDates.add(selectedDate);
      else filledDates.delete(selectedDate);
      showToast('保存しました');
      switchScreen('calendar');
      renderCalendar();
      return;
    }catch(e){
      lastError = e;
      console.error('save error (attempt '+attempt+')', e);
      await new Promise(r => setTimeout(r, 300));
    }
  }
  showToast('保存エラー: ' + (lastError && lastError.message ? lastError.message : String(lastError)));
});

document.getElementById('resetBtn').addEventListener('click', ()=>{
  document.querySelectorAll('#tbody input').forEach(inp => inp.value = '');
  document.querySelectorAll('#tbody select').forEach(sel => sel.value = '');
  updateTotal();
  showToast('入力をクリアしました');
});

/* ==================================================
   タイムピッカー(iOS風ホイール)
================================================== */
const ITEM_H = 36;
const MINUTES = Array.from({length: 31}, (_, i) => i);           // 0..30
const SECONDS = Array.from({length: 12}, (_, i) => i * 5);        // 0,5,...,55

const minCol = document.getElementById('minCol');
const secCol = document.getElementById('secCol');
const overlay = document.getElementById('pickerOverlay');
const pickerTitle = document.getElementById('pickerTitle');

function fillColumn(col, values, fmt){
  col.innerHTML = values.map(v => `<div class="item">${fmt(v)}</div>`).join('');
}
fillColumn(minCol, MINUTES, v => String(v));
fillColumn(secCol, SECONDS, v => String(v).padStart(2,'0'));

let activeInput = null;

function openPicker(input, label){
  activeInput = input;
  pickerTitle.textContent = label;
  let min = 0, sec = 0;
  const val = input.value;
  const m = val.match(/^(\d+):(\d{1,2})$/);
  if(m){
    min = Math.max(0, Math.min(30, parseInt(m[1])));
    sec = Math.round(parseInt(m[2]) / 5) * 5;
    sec = Math.max(0, Math.min(55, sec));
  }
  overlay.classList.add('show');
  requestAnimationFrame(()=>{
    minCol.scrollTop = MINUTES.indexOf(min) * ITEM_H;
    secCol.scrollTop = (sec / 5) * ITEM_H;
  });
}
function closePicker(){
  overlay.classList.remove('show');
  activeInput = null;
}
function readColumnValue(col, values){
  const idx = Math.round(col.scrollTop / ITEM_H);
  const clamped = Math.max(0, Math.min(values.length - 1, idx));
  return values[clamped];
}
document.getElementById('pickerCancel').addEventListener('click', closePicker);
document.getElementById('pickerDone').addEventListener('click', ()=>{
  if(activeInput){
    const min = readColumnValue(minCol, MINUTES);
    const sec = readColumnValue(secCol, SECONDS);
    activeInput.value = `${min}:${String(sec).padStart(2,'0')}`;
  }
  closePicker();
});
overlay.addEventListener('click', (e)=>{
  if(e.target === overlay) closePicker();
});
document.getElementById('tbody').addEventListener('click', (e)=>{
  if(e.target.classList.contains('f-cycle')) openPicker(e.target, 'サイクル');
  if(e.target.classList.contains('f-rest')) openPicker(e.target, 'セットレスト');
});

/* ==================================================
   init
================================================== */
async function init(){
  await loadFilledDates();
  renderCalendar();
}
init();
</script>
