<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no">
<title>my swimming note</title>
<style>
:root{
  --navy:#1D3557;
  --blue:#2F6FED;
  --blue-soft:#EAF1FE;
  --border:#E3E6EA;
  --header-bg:#F5F6F8;
  --text:#1F2937;
  --muted:#8A94A3;
  --danger:#E0574C;
}
*{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
html,body{margin:0;padding:0;}
body{
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Hiragino Sans","Noto Sans JP",sans-serif;
  background:#FFFFFF;
  color:var(--text);
}

.screen{display:none;}
.screen.active{display:flex;flex-direction:column;min-height:100vh;}

.day-sheet{
  position:fixed;
  left:0;
  right:0;
  bottom:0;
  height:60vh;
  max-height:92vh;
  background:#fff;
  border-radius:20px 20px 0 0;
  box-shadow:0 -6px 24px rgba(20,30,50,0.16);
  display:flex;
  flex-direction:column;
  transform:translateY(105%);
  transition:transform .3s cubic-bezier(.32,.72,0,1), height .28s cubic-bezier(.32,.72,0,1);
  z-index:30;
  overflow:hidden;
}
.day-sheet.open{transform:translateY(0);}
.day-sheet.dragging{transition:none;}
.day-sheet-handle-area{
  flex-shrink:0;
  padding:8px 0 4px;
  cursor:grab;
  touch-action:none;
}
.day-sheet-handle{
  width:36px;
  height:4px;
  border-radius:2px;
  background:var(--border);
  margin:0 auto;
  flex-shrink:0;
}
.day-sheet .topbar{position:static;}
.day-sheet .day-content{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;}

/* ---- Top bar ---- */
.topbar{
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:14px 14px;
  border-bottom:1px solid var(--border);
  position:sticky;
  top:0;
  background:#fff;
  z-index:20;
}
.icon-btn{
  background:none;
  border:none;
  padding:6px;
  color:var(--navy);
  cursor:pointer;
  display:flex;
  align-items:center;
  justify-content:center;
  width:34px;
  height:34px;
  flex-shrink:0;
}
.icon-btn svg{width:22px;height:22px;}
.topbar-spacer{width:34px;flex-shrink:0;}
.title{
  font-size:19px;
  font-weight:700;
  color:var(--navy);
  letter-spacing:.01em;
  margin:0;
  text-align:center;
  flex:1;
}
.save-btn{
  background:none;
  border:none;
  color:var(--blue);
  font-size:15px;
  font-weight:600;
  cursor:pointer;
  padding:6px 4px;
  flex-shrink:0;
}
.save-btn:active{opacity:.6;}

/* ---- Calendar ---- */
.cal-header{
  display:flex;
  align-items:center;
  justify-content:center;
  gap:18px;
  padding:16px 0 6px;
}
.month-label{
  font-size:16px;
  font-weight:700;
  color:var(--navy);
  min-width:110px;
  text-align:center;
}
.cal-arrow{
  background:none;
  border:none;
  color:var(--blue);
  font-size:20px;
  font-weight:700;
  cursor:pointer;
  padding:4px 10px;
}
.month-total{
  text-align:center;
  font-size:12.5px;
  color:var(--muted);
  font-weight:600;
  padding-bottom:4px;
  min-height:16px;
}
.month-total .val{color:var(--navy);font-weight:800;}
.cal-weekdays{
  display:grid;
  grid-template-columns:repeat(7,1fr);
  padding:8px 10px 4px;
}
.cal-weekdays span{
  text-align:center;
  font-size:11.5px;
  color:var(--muted);
  font-weight:600;
}
.cal-grid{
  display:grid;
  grid-template-columns:repeat(7,1fr);
  gap:4px;
  padding:0 10px 20px;
}
.cal-cell{
  aspect-ratio:1/1;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  border-radius:10px;
  background:none;
  border:none;
  font-size:14.5px;
  color:var(--text);
  cursor:pointer;
  position:relative;
  font-family:inherit;
}
.cal-cell.empty-cell{visibility:hidden;cursor:default;}
.cal-cell.today{font-weight:700;color:var(--blue);}
.cal-cell.today::before{
  content:"";
  position:absolute;
  inset:2px;
  border:1.5px solid var(--blue);
  border-radius:10px;
}
.cal-cell .dot{
  width:5px;
  height:5px;
  border-radius:50%;
  background:var(--blue);
  margin-top:3px;
}
.cal-cell:active{background:var(--header-bg);}

/* ---- Day screen ---- */
.day-content{
  flex:1;
  padding:24px 20px;
  display:flex;
  flex-direction:column;
  align-items:center;
}
.day-status{
  color:var(--muted);
  font-size:14.5px;
  margin:60px 0 22px;
}
.day-edit-btn{
  background:var(--blue);
  color:#fff;
  border:none;
  font-size:14.5px;
  font-weight:700;
  padding:11px 30px;
  border-radius:22px;
  cursor:pointer;
}
.day-edit-btn:active{opacity:.85;}
.day-summary{
  width:100%;
  max-width:420px;
}
.day-summary-total{
  display:flex;
  align-items:baseline;
  justify-content:center;
  gap:6px;
  margin:6px 0 18px;
}
.day-summary-total .n{font-size:28px;font-weight:800;color:var(--navy);}
.day-summary-total .u{font-size:13px;color:var(--muted);}
.day-row{
  padding:9px 2px;
  font-size:13.5px;
  color:var(--text);
}
.day-row .main{font-weight:600;}
.day-row .sub{color:var(--muted);font-size:12.5px;margin-top:2px;}
.day-rating-view{
  margin-top:14px;
  display:flex;
  gap:8px;
  flex-wrap:wrap;
}
.rating-pill{
  display:inline-flex;
  align-items:center;
  gap:4px;
  background:var(--blue-soft);
  color:var(--blue);
  font-size:12px;
  font-weight:700;
  padding:5px 12px;
  border-radius:14px;
}
.rating-pill-emoji{font-size:17px;}
.day-memo-view{
  margin-top:16px;
  padding-top:14px;
  border-top:1px solid var(--border);
}
.day-memo-view-label{
  font-size:12px;
  color:var(--muted);
  font-weight:600;
  margin-bottom:6px;
}
.day-memo-view-text{
  font-size:13.5px;
  color:var(--text);
  line-height:1.6;
  white-space:pre-wrap;
}
.day-edit-btn-wrap{
  width:100%;
  max-width:420px;
  padding-top:18px;
  text-align:center;
}

/* ---- Table (edit screen) ---- */
.table-scroll{
  flex:1;
  overflow-x:auto;
  overflow-y:auto;
  -webkit-overflow-scrolling:touch;
}
.day-rating-section{
  padding:12px 14px 4px;
  border-top:1px solid var(--border);
}
.rating-group{
  display:flex;
  align-items:center;
  gap:12px;
  margin-bottom:10px;
}
.rating-label{
  font-size:12.5px;
  color:var(--muted);
  font-weight:600;
  width:92px;
  flex-shrink:0;
  line-height:1.4;
  white-space:nowrap;
}
.rating-sublabel{
  display:block;
  font-size:10.5px;
  color:var(--muted);
  font-weight:500;
}
.rating-col{
  display:flex;
  flex-direction:column;
  gap:3px;
}
.rating-scale-labels{
  display:flex;
  justify-content:space-between;
  font-size:10px;
  color:var(--muted);
  padding:0 3px;
}
.rating-buttons{
  display:flex;
  gap:6px;
}
.rating-btn{
  width:38px;
  height:38px;
  border-radius:50%;
  border:1.5px solid var(--border);
  background:#fff;
  font-size:19px;
  line-height:1;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:0;
  cursor:pointer;
}
.rating-btn.active{
  background:var(--blue-soft);
  border-color:var(--blue);
  box-shadow:0 0 0 1.5px var(--blue);
}
.day-memo-section{
  padding:12px 14px;
  border-top:1px solid var(--border);
}
.day-memo-label{
  display:block;
  font-size:12.5px;
  color:var(--muted);
  margin-bottom:6px;
  font-weight:600;
}
.day-memo-input{
  width:100%;
  box-sizing:border-box;
  border:1px solid var(--border);
  border-radius:10px;
  padding:10px 12px;
  font-size:14px;
  font-family:inherit;
  color:var(--text);
  resize:vertical;
}
.day-memo-input:focus{
  outline:none;
  border-color:var(--navy);
}
table{
  border-collapse:collapse;
  width:100%;
  min-width:796px;
}
thead th{
  position:sticky;
  top:0;
  background:var(--header-bg);
  color:var(--muted);
  font-size:11px;
  font-weight:600;
  text-align:left;
  padding:9px 6px;
  border-bottom:1px solid var(--border);
  white-space:nowrap;
  z-index:10;
}
th.col-num, td.col-num{
  width:26px;
  text-align:center;
  color:var(--muted);
  font-size:12px;
}
tbody td{
  padding:6px 6px;
  border-bottom:1px solid var(--border);
  vertical-align:middle;
}
tbody tr:hover{background:#FAFBFC;}

.cell-input-group{
  display:flex;
  align-items:center;
  gap:3px;
}
.cell-input-group .unit{
  font-size:11px;
  color:var(--muted);
  flex-shrink:0;
}

input[type=number], input[type=text]{
  font-family:inherit;
  font-size:16px;
  color:var(--text);
  border:1px solid var(--border);
  border-radius:7px;
  padding:6px 6px;
  width:100%;
  min-width:0;
  background:#fff;
}
input[type=number]{width:48px;}
input[type=number]::-webkit-outer-spin-button,
input[type=number]::-webkit-inner-spin-button{
  -webkit-appearance:none;
  margin:0;
}
input[type=number]{-moz-appearance:textfield;}

select{
  font-family:inherit;
  font-size:16px;
  font-weight:600;
  color:var(--blue);
  border:1px solid var(--border);
  border-radius:7px;
  padding:6px 20px 6px 8px;
  background:#fff url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="10" height="6" viewBox="0 0 10 6"><path d="M1 1l4 4 4-4" stroke="%232F6FED" stroke-width="1.6" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>') no-repeat right 6px center;
  -webkit-appearance:none;
  appearance:none;
  width:100%;
  min-width:64px;
  cursor:pointer;
}

.time-field{
  position:relative;
}
.time-field input{
  padding-right:20px;
  width:64px;
  color:var(--text);
  cursor:pointer;
  background:#fff;
}
.time-field::after{
  content:"";
  position:absolute;
  right:7px;
  top:50%;
  width:8px;
  height:8px;
  transform:translateY(-65%) rotate(45deg);
  border-right:1.6px solid var(--blue);
  border-bottom:1.6px solid var(--blue);
  pointer-events:none;
}

td.col-memo input{
  border:none;
  border-radius:0;
  padding:6px 2px;
  min-width:130px;
  color:var(--text);
}
td.col-memo input:focus{
  outline:none;
  border-bottom:1.5px solid var(--blue);
}
td.col-memo{min-width:150px;}

th.col-clear, td.col-clear{
  width:36px;
  text-align:center;
  padding:6px 2px;
}
.row-clear-btn{
  background:none;
  border:none;
  color:var(--muted);
  font-size:17px;
  line-height:1;
  width:26px;
  height:26px;
  border-radius:50%;
  cursor:pointer;
  padding:0;
}
.row-clear-btn:active{background:var(--header-bg);color:var(--danger);}

input:focus, select:focus{
  outline:none;
  border-color:var(--blue);
  box-shadow:0 0 0 2px var(--blue-soft);
}

/* ---- Footer ---- */
.footer-bar{
  position:sticky;
  bottom:0;
  background:#fff;
  border-top:1px solid var(--border);
  padding:14px 16px calc(14px + env(safe-area-inset-bottom));
  display:flex;
  align-items:center;
  justify-content:space-between;
  z-index:20;
}
.total{
  display:flex;
  align-items:baseline;
  gap:6px;
}
.total-label{
  font-size:12.5px;
  color:var(--muted);
  font-weight:600;
}
.total-value{
  font-size:26px;
  font-weight:800;
  color:var(--navy);
  font-variant-numeric:tabular-nums;
}
.total-unit{
  font-size:13px;
  color:var(--muted);
}
.reset-btn{
  background:#fff;
  border:1px solid var(--border);
  color:var(--text);
  font-size:13.5px;
  font-weight:600;
  padding:9px 18px;
  border-radius:20px;
  cursor:pointer;
}
.reset-btn:active{background:var(--header-bg);}

.toast{
  position:fixed;
  bottom:80px;left:50%;
  transform:translateX(-50%);
  background:var(--navy);
  color:#fff;
  padding:9px 18px;
  border-radius:20px;
  font-size:13px;
  opacity:0;
  pointer-events:none;
  transition:opacity .2s, transform .2s;
  z-index:50;
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(-4px);}

/* ---- Time picker (iOS-style wheel, centered) ---- */
.picker-overlay{
  position:fixed;
  inset:0;
  background:rgba(15,23,42,.4);
  z-index:100;
  display:none;
  align-items:center;
  justify-content:center;
  padding:20px;
}
.picker-overlay.show{display:flex;}
.picker-sheet{
  background:#fff;
  width:100%;
  max-width:300px;
  border-radius:16px;
  box-shadow:0 12px 40px rgba(15,23,42,.25);
  opacity:0;
  transform:scale(.94);
  transition:transform .2s ease, opacity .2s ease;
}
.picker-overlay.show .picker-sheet{opacity:1;transform:scale(1);}
.picker-header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:12px 16px;
  border-bottom:1px solid var(--border);
}
.picker-header button{
  background:none;
  border:none;
  font-size:16px;
  color:var(--blue);
  font-weight:600;
  cursor:pointer;
  padding:4px;
}
.picker-header .picker-title{
  font-size:13px;
  color:var(--muted);
  font-weight:600;
}
.picker-wheels{
  position:relative;
  display:flex;
  justify-content:center;
  align-items:center;
  height:216px;
  overflow:hidden;
  padding:0 8px;
}
.picker-col{
  width:88px;
  height:216px;
  overflow-y:scroll;
  scroll-snap-type:y mandatory;
  -webkit-overflow-scrolling:touch;
  scrollbar-width:none;
  padding:90px 0;
}
.picker-col::-webkit-scrollbar{display:none;}
.picker-col .item{
  height:36px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:21px;
  color:var(--text);
  scroll-snap-align:center;
  font-variant-numeric:tabular-nums;
}
.picker-sep{
  font-size:21px;
  color:var(--muted);
  padding:0 2px;
  width:14px;
  text-align:center;
}
.picker-highlight{
  position:absolute;
  top:50%;
  left:16px;
  right:16px;
  height:36px;
  transform:translateY(-50%);
  border-top:1px solid var(--border);
  border-bottom:1px solid var(--border);
  pointer-events:none;
}
</style>
</head>
<body>

<!-- ============ 画面1: カレンダー ============ -->
<div class="screen active" id="screen-calendar">
  <div class="topbar">
    <div class="topbar-spacer"></div>
    <h1 class="title">my swimming note</h1>
    <div class="topbar-spacer"></div>
  </div>
  <div class="cal-header">
    <button class="cal-arrow" id="prevMonthBtn">‹</button>
    <span class="month-label" id="monthLabel"></span>
    <button class="cal-arrow" id="nextMonthBtn">›</button>
  </div>
  <div class="month-total" id="monthTotal"></div>
  <div class="cal-weekdays">
    <span>日</span><span>月</span><span>火</span><span>水</span><span>木</span><span>金</span><span>土</span>
  </div>
  <div class="cal-grid" id="calGrid"></div>
</div>

<!-- ============ 日詳細ボトムシート ============ -->
<div class="day-sheet" id="daySheet">
  <div class="day-sheet-handle-area" id="daySheetHandle">
    <div class="day-sheet-handle"></div>
  </div>
  <div class="topbar">
    <div class="topbar-spacer"></div>
    <h1 class="title" id="dayTitle"></h1>
    <button class="icon-btn" id="dayBackBtn" aria-label="閉じる">
      <svg viewBox="0 0 24 24" fill="none"><path d="M6 6l12 12M18 6L6 18" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </button>
  </div>
  <div class="day-content" id="dayContent"></div>
</div>

<!-- ============ 画面3: 編集(セット記録表) ============ -->
<div class="screen" id="screen-edit">
  <div class="topbar">
    <button class="icon-btn" id="editBackBtn" aria-label="戻る">
      <svg viewBox="0 0 24 24" fill="none"><path d="M15 5l-7 7 7 7" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </button>
    <h1 class="title" id="editTitle">編集</h1>
    <button class="save-btn" id="saveBtn">保存</button>
  </div>

  <div class="table-scroll">
    <table>
      <thead>
        <tr>
          <th class="col-num"></th>
          <th style="width:78px">種目</th>
          <th style="width:76px">距離</th>
          <th style="width:64px">本数(t)</th>
          <th style="width:64px">セット(s)</th>
          <th style="width:82px">サイクル</th>
          <th style="width:90px">セットレスト</th>
          <th style="width:70px">種目</th>
          <th>詳細</th>
          <th class="col-clear" style="width:36px"></th>
        </tr>
      </thead>
      <tbody id="tbody"></tbody>
    </table>
  </div>

  <div class="day-rating-section">
    <div class="rating-group">
      <div class="rating-label">コンディション<span class="rating-sublabel">練習前</span></div>
      <div class="rating-col">
        <div class="rating-buttons" id="conditionRating">
          <button type="button" class="rating-btn" data-value="1" title="不調">😞</button>
          <button type="button" class="rating-btn" data-value="2" title="やや不調">😕</button>
          <button type="button" class="rating-btn" data-value="3" title="普通">😐</button>
          <button type="button" class="rating-btn" data-value="4" title="良い">🙂</button>
          <button type="button" class="rating-btn" data-value="5" title="絶好調">😄</button>
        </div>
      </div>
    </div>
    <div class="rating-group">
      <div class="rating-label">疲労感<span class="rating-sublabel">練習後</span></div>
      <div class="rating-col">
        <div class="rating-buttons" id="effortRating">
          <button type="button" class="rating-btn" data-value="1" title="楽">😞</button>
          <button type="button" class="rating-btn" data-value="2" title="やや楽">😕</button>
          <button type="button" class="rating-btn" data-value="3" title="普通">😐</button>
          <button type="button" class="rating-btn" data-value="4" title="ややきつい">🙂</button>
          <button type="button" class="rating-btn" data-value="5" title="きつい">😄</button>
        </div>
      </div>
    </div>
  </div>

  <div class="day-memo-section">
    <label class="day-memo-label" for="dayMemoInput">メモ</label>
    <textarea id="dayMemoInput" class="day-memo-input" rows="4" placeholder="今日の練習でどう感じたか、気づいたことなど"></textarea>
  </div>

  <div class="footer-bar">
    <div class="total">
      <span class="total-label">合計距離</span>
      <span class="total-value" id="totalValue">0</span>
      <span class="total-unit">m</span>
    </div>
    <button class="reset-btn" id="resetBtn">リセット</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<!-- Time picker sheet -->
<div class="picker-overlay" id="pickerOverlay">
  <div class="picker-sheet">
    <div class="picker-header">
      <button id="pickerCancel">キャンセル</button>
      <span class="picker-title" id="pickerTitle">サイクル</span>
      <button id="pickerDone">完了</button>
    </div>
    <div class="picker-wheels">
      <div class="picker-highlight"></div>
      <div class="picker-col" id="minCol"></div>
      <span class="picker-sep">:</span>
      <div class="picker-col" id="secCol"></div>
    </div>
  </div>
</div>

<script>
/* ==================================================
   共通ユーティリティ
================================================== */
function showToast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 1600);
}
function switchScreen(name){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById('screen-'+name).classList.add('active');
  window.scrollTo(0,0);
}
function escapeHtml(str){
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/\n/g, '<br>');
}

function pad2(n){ return String(n).padStart(2,'0'); }
function dateKey(y,m,d){ return `${y}-${pad2(m+1)}-${pad2(d)}`; }
function todayKey(){
  const t = new Date();
  return dateKey(t.getFullYear(), t.getMonth(), t.getDate());
}

/* ==================================================
   保存機能(ブラウザ標準のlocalStorageを利用)
   ※Claude専用のwindow.storage APIではなく、
     Safari/Chromeなど通常のブラウザや、将来Capacitorで
     iPhoneアプリ化した際にもそのまま動く実装。
================================================== */
const NOTE_PREFIX = 'swimnote:';
window.storage = {
  async get(key){
    const raw = localStorage.getItem(NOTE_PREFIX + key);
    if(raw === null) throw new Error('not found');
    return { key, value: raw, shared: false };
  },
  async set(key, value){
    localStorage.setItem(NOTE_PREFIX + key, value);
    return { key, value, shared: false };
  },
  async delete(key){
    localStorage.removeItem(NOTE_PREFIX + key);
    return { key, deleted: true, shared: false };
  },
  async list(prefix){
    const keys = [];
    for(let i = 0; i < localStorage.length; i++){
      const k = localStorage.key(i);
      if(!k || !k.startsWith(NOTE_PREFIX)) continue;
      const bare = k.slice(NOTE_PREFIX.length);
      if(!prefix || bare.startsWith(prefix)) keys.push(bare);
    }
    return { keys, prefix, shared: false };
  }
};

/* ==================================================
   画面1: カレンダー
================================================== */
let calYear, calMonth; // calMonth: 0-11
{
  const t = new Date();
  calYear = t.getFullYear();
  calMonth = t.getMonth();
}
let filledDates = new Set();

async function loadFilledDates(){
  filledDates = new Set();
  try{
    const res = await window.storage.list('sheet:');
    if(res && res.keys){
      res.keys.forEach(k=>{
        const d = k.replace('sheet:', '');
        filledDates.add(d);
      });
    }
  }catch(e){ /* no data yet */ }
}

function calcDayTotal(rows){
  if(!rows) return 0;
  let total = 0;
  rows.forEach(r=>{
    const distance = parseFloat(r.distance) || 0;
    if(distance <= 0) return;
    const reps = parseFloat(r.reps) || 1;
    const sets = parseFloat(r.sets) || 1;
    total += distance*reps*sets;
  });
  return total;
}

async function calcMonthTotal(year, month){
  const daysInMonth = new Date(year, month+1, 0).getDate();
  let total = 0;
  for(let d=1; d<=daysInMonth; d++){
    const key = dateKey(year, month, d);
    if(!filledDates.has(key)) continue;
    try{
      const res = await window.storage.get('sheet:'+key);
      if(res && res.value){
        const data = parseStoredData(res.value);
        total += calcDayTotal(data.rows);
      }
    }catch(e){ /* skip */ }
  }
  return total;
}

async function renderCalendar(){
  document.getElementById('monthLabel').textContent = `${calYear}年${calMonth+1}月`;
  const grid = document.getElementById('calGrid');
  grid.innerHTML = '';
  const firstDay = new Date(calYear, calMonth, 1).getDay();
  const daysInMonth = new Date(calYear, calMonth+1, 0).getDate();
  const tKey = todayKey();

  for(let i=0; i<firstDay; i++){
    const empty = document.createElement('div');
    empty.className = 'cal-cell empty-cell';
    grid.appendChild(empty);
  }
  for(let d=1; d<=daysInMonth; d++){
    const key = dateKey(calYear, calMonth, d);
    const cell = document.createElement('button');
    cell.className = 'cal-cell' + (key === tKey ? ' today' : '');
    cell.innerHTML = `<span>${d}</span>` + (filledDates.has(key) ? '<span class="dot"></span>' : '');
    cell.addEventListener('click', ()=> openDay(key));
    grid.appendChild(cell);
  }

  const monthTotalEl = document.getElementById('monthTotal');
  monthTotalEl.textContent = '';
  const thisYear = calYear, thisMonth = calMonth;
  const total = await calcMonthTotal(thisYear, thisMonth);
  if(thisYear === calYear && thisMonth === calMonth){
    monthTotalEl.innerHTML = total > 0 ? `月間合計 <span class="val">${total.toLocaleString('ja-JP')}</span> m` : '';
  }
}

document.getElementById('prevMonthBtn').addEventListener('click', ()=>{
  calMonth--;
  if(calMonth < 0){ calMonth = 11; calYear--; }
  renderCalendar();
});
document.getElementById('nextMonthBtn').addEventListener('click', ()=>{
  calMonth++;
  if(calMonth > 11){ calMonth = 0; calYear++; }
  renderCalendar();
});

/* ==================================================

================================================== */
let selectedDate = null;

function formatDateTitle(key){
  const [y,m,d] = key.split('-').map(Number);
  const wd = ['日','月','火','水','木','金','土'][new Date(y, m-1, d).getDay()];
  return `${m}月${d}日(${wd})`;
}

function openDaySheet(){
  document.getElementById('daySheet').classList.add('open');
}
function closeDaySheet(){
  document.getElementById('daySheet').classList.remove('open');
}

/* ---- ボトムシート: ドラッグでリサイズ ---- */
const DAY_SHEET_SNAPS = [0.32, 0.6, 0.92]; // 画面高さに対する割合(小・中・大)
const DAY_SHEET_DEFAULT_SNAP = 1; // 開いた時のデフォルト(中)
const DAY_SHEET_DISMISS_RATIO = 0.18; // これより下に離したら閉じる

function setDaySheetHeight(px, animate){
  const sheet = document.getElementById('daySheet');
  if(!animate) sheet.classList.add('dragging');
  sheet.style.height = px + 'px';
  if(!animate){
    // force reflow so the next height change (if any) can transition again
    void sheet.offsetHeight;
    sheet.classList.remove('dragging');
  }
}

function snapDaySheetTo(index){
  const h = window.innerHeight * DAY_SHEET_SNAPS[index];
  const sheet = document.getElementById('daySheet');
  sheet.classList.remove('dragging');
  sheet.style.height = h + 'px';
}

(function initDaySheetDrag(){
  const handle = document.getElementById('daySheetHandle');
  const sheet = document.getElementById('daySheet');
  let startY = 0;
  let startHeight = 0;
  let dragging = false;

  function onPointerDown(e){
    dragging = true;
    startY = e.clientY;
    startHeight = sheet.getBoundingClientRect().height;
    sheet.classList.add('dragging');
    handle.setPointerCapture(e.pointerId);
  }
  function onPointerMove(e){
    if(!dragging) return;
    const deltaY = startY - e.clientY;
    let newHeight = startHeight + deltaY;
    const maxH = window.innerHeight * 0.94;
    const minH = 60; // rubber-band floor while dragging
    if(newHeight > maxH) newHeight = maxH + (newHeight - maxH) * 0.2;
    if(newHeight < minH) newHeight = minH;
    sheet.style.height = newHeight + 'px';
  }
  function onPointerUp(e){
    if(!dragging) return;
    dragging = false;
    sheet.classList.remove('dragging');
    const currentHeight = sheet.getBoundingClientRect().height;
    const ratio = currentHeight / window.innerHeight;

    if(ratio < DAY_SHEET_DISMISS_RATIO){
      closeDaySheet();
      // reset to default height for next time, after the close transition starts
      setTimeout(()=> snapDaySheetTo(DAY_SHEET_DEFAULT_SNAP), 300);
      return;
    }
    // snap to nearest of the 3 preset heights
    let closestIdx = 0;
    let closestDist = Infinity;
    DAY_SHEET_SNAPS.forEach((frac, i)=>{
      const dist = Math.abs(ratio - frac);
      if(dist < closestDist){ closestDist = dist; closestIdx = i; }
    });
    snapDaySheetTo(closestIdx);
  }

  handle.addEventListener('pointerdown', onPointerDown);
  handle.addEventListener('pointermove', onPointerMove);
  handle.addEventListener('pointerup', onPointerUp);
  handle.addEventListener('pointercancel', onPointerUp);
})();

async function openDay(key){
  selectedDate = key;
  document.getElementById('dayTitle').textContent = formatDateTitle(key);
  snapDaySheetTo(DAY_SHEET_DEFAULT_SNAP);
  openDaySheet();
  await renderDayScreen();
}

async function renderDayScreen(){
  const content = document.getElementById('dayContent');
  content.innerHTML = '<div class="day-status">読み込み中...</div>';
  let rows = null;
  let memo = '';
  let condition = '';
  let effort = '';
  try{
    const res = await window.storage.get('sheet:'+selectedDate);
    if(res && res.value){
      const data = parseStoredData(res.value);
      rows = data.rows;
      memo = data.memo;
      condition = data.condition;
      effort = data.effort;
    }
  }catch(e){ rows = null; }

  const hasRows = rows && rows.some(r => Object.values(r).some(v => v !== '' && v != null));
  const hasMemo = memo && memo.trim() !== '';
  const hasRating = condition !== '' || effort !== '';
  const hasContent = hasRows || hasMemo || hasRating;

  if(!hasContent){
    content.innerHTML = `
      <div class="day-status">未入力</div>
      <button class="day-edit-btn" id="dayEditBtn">編集</button>`;
  } else {
    let total = 0;
    const rowsHtml = hasRows ? rows.filter(r => Object.values(r).some(v => v !== '' && v != null)).map(r=>{
      const distance = parseFloat(r.distance) || 0;
      const reps = parseFloat(r.reps) || 1;
      const sets = parseFloat(r.sets) || 1;
      if(distance > 0) total += distance*reps*sets;
      const mainParts = [];
      if(r.type) mainParts.push(r.type);
      const sizeParts = [];
      if(r.distance) sizeParts.push(r.distance+'m');
      if(r.reps) sizeParts.push('×'+r.reps+'t');
      if(r.sets) sizeParts.push('×'+r.sets+'s');
      if(sizeParts.length) mainParts.push(sizeParts.join(''));
      if(r.stroke) mainParts.push(r.stroke);
      if(r.cycle) mainParts.push(r.cycle);
      if(r.rest) mainParts.push('(rest'+r.rest+')');
      const subParts = [];
      if(r.memo) subParts.push('・'+r.memo);
      return `<div class="day-row">
        <div class="main">${mainParts.join(' ') || '(未設定)'}</div>
        ${subParts.length ? `<div class="sub">${subParts.join(' ')}</div>` : ''}
      </div>`;
    }).join('') : '';

    const ratingHtml = hasRating ? `
      <div class="day-rating-view">
        ${condition ? `<span class="rating-pill">コンディション <span class="rating-pill-emoji">${CONDITION_EMOJI[condition] || ''}</span></span>` : ''}
        ${effort ? `<span class="rating-pill">疲労感 <span class="rating-pill-emoji">${EFFORT_EMOJI[effort] || ''}</span></span>` : ''}
      </div>` : '';

    const memoHtml = hasMemo ? `
      <div class="day-memo-view">
        <div class="day-memo-view-label">メモ</div>
        <div class="day-memo-view-text">${escapeHtml(memo)}</div>
      </div>` : '';

    content.innerHTML = `
      <div class="day-summary">
        <div class="day-summary-total"><span class="n">${total.toLocaleString('ja-JP')}</span><span class="u">m</span></div>
        ${rowsHtml}
        ${ratingHtml}
        ${memoHtml}
      </div>
      <div class="day-edit-btn-wrap">
        <button class="day-edit-btn" id="dayEditBtn">編集</button>
      </div>`;
  }
  document.getElementById('dayEditBtn').addEventListener('click', openEdit);
}

document.getElementById('dayBackBtn').addEventListener('click', ()=>{
  closeDaySheet();
});

/* ==================================================
   画面3: 編集(セット記録表)
================================================== */
const ROW_COUNT = 20;
const TYPE_OPTIONS = ['', 'swim', 'kick', 'pull', 'drill', 'tech'];
const STROKE_OPTIONS = ['', 'fly', 'ba', 'br', 'fr', 'IM', 'mix', 'cho'];

const TYPE_LABELS = {
  swim: 'スイム',
  kick: 'キック',
  pull: 'プル',
  drill: 'ドリル',
  tech: 'テクニック'
};
const STROKE_LABELS = {
  fly: 'バタフライ',
  ba: '背泳ぎ',
  br: '平泳ぎ',
  fr: '自由形',
  IM: '個人メドレー',
  mix: 'ミックス',
  cho: 'cho'
};

const CONDITION_LABELS = { 1: '不調', 2: 'やや不調', 3: '普通', 4: '良い', 5: '絶好調' };
const EFFORT_LABELS = { 1: '楽', 2: 'やや楽', 3: '普通', 4: 'ややきつい', 5: 'きつい' };
const CONDITION_EMOJI = { 1: '😞', 2: '😕', 3: '😐', 4: '🙂', 5: '😄' };
const EFFORT_EMOJI = { 1: '😞', 2: '😕', 3: '😐', 4: '🙂', 5: '😄' };

function distanceOptions(){
  const opts = ['', '25', '50', '75', '100'];
  for(let d = 150; d <= 1000; d += 50) opts.push(String(d));
  return opts;
}
const DISTANCE_OPTIONS = distanceOptions();

function makeSelect(options, cls){
  const opts = options.map(o => `<option value="${o}">${o}</option>`).join('');
  return `<select class="${cls}">${opts}</select>`;
}

function buildRows(){
  const tbody = document.getElementById('tbody');
  let html = '';
  for(let i = 1; i <= ROW_COUNT; i++){
    html += `
      <tr data-row="${i}">
        <td class="col-num">${i}</td>
        <td>${makeSelect(TYPE_OPTIONS, 'f-type')}</td>
        <td>
          <div class="cell-input-group">
            ${makeSelect(DISTANCE_OPTIONS, 'f-distance')}
            <span class="unit">m</span>
          </div>
        </td>
        <td>
          <div class="cell-input-group">
            <input type="number" class="f-reps" min="0" inputmode="numeric">
            <span class="unit">t</span>
          </div>
        </td>
        <td>
          <div class="cell-input-group">
            <input type="number" class="f-sets" min="0" inputmode="numeric">
            <span class="unit">s</span>
          </div>
        </td>
        <td>
          <div class="time-field">
            <input type="text" class="f-cycle" placeholder=":" readonly>
          </div>
        </td>
        <td>
          <div class="time-field">
            <input type="text" class="f-rest" placeholder=":" readonly>
          </div>
        </td>
        <td>${makeSelect(STROKE_OPTIONS, 'f-stroke')}</td>
        <td class="col-memo"><input type="text" class="f-memo" placeholder=""></td>
        <td class="col-clear"><button type="button" class="row-clear-btn" aria-label="この行をクリア">×</button></td>
      </tr>`;
  }
  tbody.innerHTML = html;
}

function collectRows(){
  const rows = [];
  document.querySelectorAll('#tbody tr').forEach(tr=>{
    rows.push({
      type: tr.querySelector('.f-type').value,
      distance: tr.querySelector('.f-distance').value,
      reps: tr.querySelector('.f-reps').value,
      sets: tr.querySelector('.f-sets').value,
      cycle: tr.querySelector('.f-cycle').value,
      rest: tr.querySelector('.f-rest').value,
      stroke: tr.querySelector('.f-stroke').value,
      memo: tr.querySelector('.f-memo').value
    });
  });
  return rows;
}

function applyRows(rows){
  const trs = document.querySelectorAll('#tbody tr');
  trs.forEach((tr, i)=>{
    const r = rows[i];
    if(!r) return;
    tr.querySelector('.f-type').value = r.type || '';
    tr.querySelector('.f-distance').value = r.distance || '';
    tr.querySelector('.f-reps').value = r.reps || '';
    tr.querySelector('.f-sets').value = r.sets || '';
    tr.querySelector('.f-cycle').value = r.cycle || '';
    tr.querySelector('.f-rest').value = r.rest || '';
    tr.querySelector('.f-stroke').value = r.stroke || '';
    tr.querySelector('.f-memo').value = r.memo || '';
  });
  updateTotal();
}

function updateTotal(){
  let total = 0;
  document.querySelectorAll('#tbody tr').forEach(tr=>{
    const distance = parseFloat(tr.querySelector('.f-distance').value) || 0;
    if(distance <= 0) return;
    const reps = parseFloat(tr.querySelector('.f-reps').value) || 1;
    const sets = parseFloat(tr.querySelector('.f-sets').value) || 1;
    total += distance * reps * sets;
  });
  document.getElementById('totalValue').textContent = total.toLocaleString('ja-JP');
}

function setRating(groupId, value){
  document.querySelectorAll('#'+groupId+' .rating-btn').forEach(btn=>{
    btn.classList.toggle('active', btn.dataset.value === String(value));
  });
}
function getRating(groupId){
  const active = document.querySelector('#'+groupId+' .rating-btn.active');
  return active ? active.dataset.value : '';
}
document.querySelectorAll('.rating-buttons').forEach(group=>{
  group.addEventListener('click', (e)=>{
    const btn = e.target.closest('.rating-btn');
    if(!btn) return;
    const wasActive = btn.classList.contains('active');
    group.querySelectorAll('.rating-btn').forEach(b => b.classList.remove('active'));
    if(!wasActive) btn.classList.add('active');
  });
});

document.getElementById('tbody').addEventListener('input', updateTotal);
document.getElementById('tbody').addEventListener('change', updateTotal);

document.getElementById('tbody').addEventListener('click', (e)=>{
  const btn = e.target.closest('.row-clear-btn');
  if(!btn) return;
  const tr = btn.closest('tr');
  tr.querySelectorAll('input').forEach(inp => inp.value = '');
  tr.querySelectorAll('select').forEach(sel => sel.value = '');
  updateTotal();
});

function parseStoredData(raw){
  const parsed = JSON.parse(raw);
  if(Array.isArray(parsed)) return { rows: parsed, memo: '', condition: '', effort: '' };
  return { rows: parsed.rows || [], memo: parsed.memo || '', condition: parsed.condition || '', effort: parsed.effort || '' };
}

async function openEdit(){
  closeDaySheet();
  document.getElementById('editTitle').textContent = formatDateTitle(selectedDate);
  buildRows();
  let rows = null;
  let memo = '';
  let condition = '';
  let effort = '';
  try{
    const res = await window.storage.get('sheet:'+selectedDate);
    if(res && res.value){
      const data = parseStoredData(res.value);
      rows = data.rows;
      memo = data.memo;
      condition = data.condition;
      effort = data.effort;
    }
  }catch(e){ rows = null; }
  if(rows) applyRows(rows);
  else updateTotal();
  document.getElementById('dayMemoInput').value = memo;
  setRating('conditionRating', condition);
  setRating('effortRating', effort);
  switchScreen('edit');
}

document.getElementById('editBackBtn').addEventListener('click', ()=>{
  switchScreen('calendar');
  openDay(selectedDate);
});

document.getElementById('saveBtn').addEventListener('click', async ()=>{
  const rows = collectRows();
  const memo = document.getElementById('dayMemoInput').value;
  const condition = getRating('conditionRating');
  const effort = getRating('effortRating');
  if(!window.storage){
    showToast('storage機能が利用できません');
    return;
  }
  const payload = JSON.stringify({ rows, memo, condition, effort });
  let lastError = null;
  for(let attempt = 0; attempt < 2; attempt++){
    try{
      await window.storage.set('sheet:'+selectedDate, payload);
      const hasContent = rows.some(r => Object.values(r).some(v => v !== '' && v != null)) || memo.trim() !== '' || condition !== '' || effort !== '';
      if(hasContent) filledDates.add(selectedDate);
      else filledDates.delete(selectedDate);
      showToast('保存しました');
      switchScreen('calendar');
      renderCalendar();
      return;
    }catch(e){
      lastError = e;
      console.error('save error (attempt '+attempt+')', e);
      await new Promise(r => setTimeout(r, 300));
    }
  }
  showToast('保存エラー: ' + (lastError && lastError.message ? lastError.message : String(lastError)));
});

document.getElementById('resetBtn').addEventListener('click', ()=>{
  document.querySelectorAll('#tbody input').forEach(inp => inp.value = '');
  document.querySelectorAll('#tbody select').forEach(sel => sel.value = '');
  document.getElementById('dayMemoInput').value = '';
  setRating('conditionRating', '');
  setRating('effortRating', '');
  updateTotal();
  showToast('入力をクリアしました');
});

/* ==================================================
   タイムピッカー(iOS風ホイール)
================================================== */
const ITEM_H = 36;
const MINUTES = Array.from({length: 31}, (_, i) => i);           // 0..30
const SECONDS = Array.from({length: 12}, (_, i) => i * 5);        // 0,5,...,55

const minCol = document.getElementById('minCol');
const secCol = document.getElementById('secCol');
const overlay = document.getElementById('pickerOverlay');
const pickerTitle = document.getElementById('pickerTitle');

function fillColumn(col, values, fmt){
  col.innerHTML = values.map(v => `<div class="item">${fmt(v)}</div>`).join('');
}
fillColumn(minCol, MINUTES, v => String(v));
fillColumn(secCol, SECONDS, v => String(v).padStart(2,'0'));

let activeInput = null;

function openPicker(input, label){
  activeInput = input;
  pickerTitle.textContent = label;
  let min = 0, sec = 0;
  const val = input.value;
  const m = val.match(/^(\d+):(\d{1,2})$/);
  if(m){
    min = Math.max(0, Math.min(30, parseInt(m[1])));
    sec = Math.round(parseInt(m[2]) / 5) * 5;
    sec = Math.max(0, Math.min(55, sec));
  }
  overlay.classList.add('show');
  requestAnimationFrame(()=>{
    minCol.scrollTop = MINUTES.indexOf(min) * ITEM_H;
    secCol.scrollTop = (sec / 5) * ITEM_H;
  });
}
function closePicker(){
  overlay.classList.remove('show');
  activeInput = null;
}
function readColumnValue(col, values){
  const idx = Math.round(col.scrollTop / ITEM_H);
  const clamped = Math.max(0, Math.min(values.length - 1, idx));
  return values[clamped];
}
document.getElementById('pickerCancel').addEventListener('click', closePicker);
document.getElementById('pickerDone').addEventListener('click', ()=>{
  if(activeInput){
    const min = readColumnValue(minCol, MINUTES);
    const sec = readColumnValue(secCol, SECONDS);
    activeInput.value = `${min}:${String(sec).padStart(2,'0')}`;
  }
  closePicker();
});
overlay.addEventListener('click', (e)=>{
  if(e.target === overlay) closePicker();
});
document.getElementById('tbody').addEventListener('click', (e)=>{
  if(e.target.classList.contains('f-cycle')) openPicker(e.target, 'サイクル');
  if(e.target.classList.contains('f-rest')) openPicker(e.target, 'セットレスト');
});

/* ==================================================
   init
================================================== */
async function init(){
  await loadFilledDates();
  renderCalendar();
}
init();
